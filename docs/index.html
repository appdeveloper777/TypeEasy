/* ============================================================
   TypeEasy Tutorial — single-file static site
   - hash routing
   - custom .te syntax highlighter (offline)
   ============================================================ */

/* ---------- Syntax highlighter for TypeEasy ---------- */
const TE_KW = new Set(["let","var","const","class","extends","new","this","return","if","else","while","for","in","break","continue","true","false","null","try","catch","finally","throw","fn","import","endpoint"]);
const TE_TYPE = new Set(["int","string","float","bool","datetime","uuid","void","dynamic"]);

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function highlightTE(src){
  let out = "";
  let i = 0; const n = src.length;
  while(i < n){
    const c = src[i];
    // line comment
    if(c === "/" && src[i+1] === "/"){
      let j = i; while(j < n && src[j] !== "\n") j++;
      out += '<span class="tk-com">'+escapeHtml(src.slice(i,j))+'</span>'; i = j; continue;
    }
    // block comment
    if(c === "/" && src[i+1] === "*"){
      let j = i+2; while(j < n && !(src[j] === "*" && src[j+1] === "/")) j++;
      j = Math.min(n, j+2);
      out += '<span class="tk-com">'+escapeHtml(src.slice(i,j))+'</span>'; i = j; continue;
    }
    // attribute [HttpGet("...")]
    if(c === "[" ){
      let j = i+1; while(j < n && src[j] !== "]" && src[j] !== "\n") j++;
      if(j < n && src[j] === "]"){
        out += '<span class="tk-attr">'+escapeHtml(src.slice(i,j+1))+'</span>'; i = j+1; continue;
      }
    }
    // string (double quote, with optional $ prefix)
    if(c === '"' || (c === '$' && src[i+1] === '"')){
      let j = (c === '$') ? i+2 : i+1;
      while(j < n){ if(src[j] === '\\'){ j += 2; continue; } if(src[j] === '"'){ j++; break; } j++; }
      out += '<span class="tk-str">'+escapeHtml(src.slice(i,j))+'</span>'; i = j; continue;
    }
    // number
    if(/[0-9]/.test(c)){
      let j = i; while(j < n && /[0-9a-fA-FxXbB_.]/.test(src[j])) j++;
      out += '<span class="tk-num">'+escapeHtml(src.slice(i,j))+'</span>'; i = j; continue;
    }
    // identifier / keyword
    if(/[A-Za-z_]/.test(c)){
      let j = i; while(j < n && /[A-Za-z0-9_]/.test(src[j])) j++;
      const word = src.slice(i,j);
      // function call?
      let k = j; while(k < n && src[k] === ' ') k++;
      if(TE_KW.has(word)) out += '<span class="tk-kw">'+word+'</span>';
      else if(TE_TYPE.has(word)) out += '<span class="tk-type">'+word+'</span>';
      else if(src[k] === '(') out += '<span class="tk-fn">'+escapeHtml(word)+'</span>';
      else out += escapeHtml(word);
      i = j; continue;
    }
    // punctuation
    if(/[{}()\[\];:,.<>=+\-*\/%!&|^~?]/.test(c)){
      out += '<span class="tk-punc">'+escapeHtml(c)+'</span>'; i++; continue;
    }
    out += escapeHtml(c); i++;
  }
  return out;
}

/* ---------- Code block builders ---------- */
function te(code, label){
  label = label || "typeeasy";
  const cp = (window.I18N && window.LANG) ? window.I18N[window.LANG].copy : "Copiar";
  return `<div class="code-wrap"><span class="lbl">${label}</span>`
    + `<button class="copy" onclick="copyCode(this)">${cp}</button>`
    + `<pre data-raw="${encodeURIComponent(code)}">${highlightTE(code)}</pre></div>`;
}
function sh(code){
  const cp = (window.I18N && window.LANG) ? window.I18N[window.LANG].copy : "Copiar";
  return `<div class="code-wrap"><span class="lbl">shell</span>`
    + `<button class="copy" onclick="copyCode(this)">${cp}</button>`
    + `<pre class="shell" data-raw="${encodeURIComponent(code)}">${escapeHtml(code)}</pre></div>`;
}
function out(text){ return `<div class="output">${escapeHtml(text)}</div>`; }
function copyCode(btn){
  const pre = btn.parentElement.querySelector("pre");
  const raw = decodeURIComponent(pre.getAttribute("data-raw"));
  const done = (window.I18N && window.LANG) ? window.I18N[window.LANG].copied : "✓ Copiado";
  navigator.clipboard.writeText(raw).then(()=>{ const t=btn.textContent; btn.textContent=done; setTimeout(()=>btn.textContent=t,1200); });
}

/* ---------- Content pages registered below in pages.js-style object ---------- */
window.PAGES_ES = {};
window.PAGES_EN = {};
// During the ES content script blocks, PAGES aliases the Spanish dictionary.
window.PAGES = window.PAGES_ES;
window.NAV = [];

/* ---------- UI strings (topbar/pager labels) ---------- */
window.I18N = {
  es: { nav_home: "Inicio", nav_quick: "Quickstart", nav_apis: "APIs", copy: "Copiar", copied: "✓ Copiado" },
  en: { nav_home: "Home", nav_quick: "Quickstart", nav_apis: "APIs", copy: "Copy", copied: "✓ Copied" }
};
window.LANG = "es";
</script>

PAGES.intro = `
<h1>Introducción a TypeEasy</h1>
<p class="lead">TypeEasy es un lenguaje interpretado, con tipado opcional, diseñado con un objetivo único: <strong>ser la forma más rápida de escribir y desplegar una API HTTP</strong>.</p>

<h2>El problema que resuelve</h2>
<p>Levantar una API hoy suele implicar instalar un runtime (Node, Python, JVM), un gestor de paquetes, decenas de dependencias y, casi siempre, Docker para que "funcione en todos lados". TypeEasy elimina todo eso: el intérprete es un <strong>único binario nativo</strong> (Windows y Linux) que ejecuta tus archivos <code class="inline">.te</code> directamente.</p>

<h2>Cómo se ve el lenguaje</h2>
${te(`// Variables con inferencia de tipo
let nombre = "Ana";
var edad = 30;
const PI = 3.1416;

// Función / lambda
var doble = fn(x) => x * 2;
println(doble(21));        // 42

// Clase
class Persona {
    nombre : string;
    saludar() : string {
        return "Hola, soy " + this.nombre;
    }
}`)}

<h2>Qué vas a aprender</h2>
<ul>

${out("0: rojo\\n1: verde\\n2: azul")}

<h2>for numérico (contar de inicio a límite)</h2>
<p>TypeEasy tiene un <code class="inline">for</code> numérico con la forma
<code class="inline">for (variable = inicio; límite; paso)</code>. El <strong>segundo número es el límite (exclusivo)</strong>
y el <strong>tercero es el paso</strong> — no es una condición como en C/JavaScript.</p>
${te(`// cuenta de 0 a 4 (límite 5, paso 1)
for (i = 0; 5; 1) {
    println(i);
}`)}
${out("0\\n1\\n2\\n3\\n4")}

<p>Con paso de 2:</p>
${te(`for (i = 0; 10; 2) {
    println(i);
}`)}

<p>Acumular en una variable externa:</p>
${te(`var suma = 0;
for (i = 1; 5; 1) {
    suma = suma + i;
}
println("suma 1..4 = " + suma);   // 10`)}
${out("suma 1..4 = 10")}

<p>El <strong>límite y el paso pueden ser variables o expresiones</strong> (se evalúan una vez al entrar al bucle):</p>
${te(`let lim = 4;
let paso = 2;
for (i = 0; lim; paso) {
    println(i);
}`)}
${out("0\\n2")}

<p>El cuerpo puede tener <strong>varias sentencias</strong>; cada una se ejecuta una vez por iteración:</p>
${te(`for (i = 0; 3; 1) {
    println("A=" + i);
    println("B=" + i);
}`)}
${out("A=0\\nB=0\\nA=1\\nB=1\\nA=2\\nB=2")}

<p>También se pueden anidar:</p>
${te(`for (i = 0; 2; 1) {
    for (j = 0; 2; 1) {
        println(i + "," + j);
    }
}`)}
${out("0,0\\n0,1\\n1,0\\n1,1")}

<p>Si necesitas <strong>empezar desde una variable</strong>, no la pongas en el inicio del <code class="inline">for</code>
(daría error de sintaxis). Inicialízala antes con <code class="inline">var</code> y usa <code class="inline">while</code>:</p>
${te(`let start = 2;
var i = start;          // var (mutable), no let
while (i < 5) {
    println(i);
    i = i + 1;
}`)}
${out("2\\n3\\n4")}

<div class="note"><strong>Regla del for numérico.</strong>
<ul>
<li>El <strong>inicio debe ser un número literal</strong> (<code class="inline">for (i = 0; ...)</code>); una variable en el inicio da error de sintaxis. Si necesitas empezar en una variable, inicialízala antes con <code class="inline">var</code> y usa <code class="inline">while</code> (ver ejemplo arriba).</li>
</ul>
El <strong>límite</strong> y el <strong>paso</strong> sí admiten variables/expresiones, y el cuerpo admite varias sentencias.</div>

<h2>break y continue</h2>
${te(`var i = 0;
while (i < 10) {
    i++;
    if (i == 3) { continue; }   // salta el 3
    if (i == 6) { break; }      // corta en el 6
    println(i);
}`)}

</div>

<h1>Bridge a otros lenguajes</h1>
<p class="lead">TypeEasy puede lanzar un programa externo (Python, Node, Java, Rust...) y hablar con él por un protocolo de líneas JSON. Así reutilizas librerías que no existen en TypeEasy.</p>

<h2>El protocolo</h2>
<ul>
<li><code class="inline">lang_spawn(cmd)</code> — abre el proceso, devuelve un <em>slot</em> (int). Negativo si falla.</li>
<li><code class="inline">lang_call(slot, linea)</code> — envía una línea y espera <strong>una</strong> línea de respuesta.</li>
<li><code class="inline">lang_send</code> / <code class="inline">lang_recv</code> — envío y recepción por separado.</li>
<li><code class="inline">lang_close(slot)</code> — cierra el proceso.</li>
</ul>
<p>El worker lee JSON de <code class="inline">stdin</code> y responde JSON por <code class="inline">stdout</code>, una línea por mensaje.</p>

<h2>Lado TypeEasy</h2>
${te(`let py = lang_spawn("python worker.py");

if (py < 0) {
    println("No se pudo lanzar el worker.");
} else {
    // pedir al worker que ponga texto en mayúsculas
    let req = json_stringify({ "op": "upper", "text": "hola mundo" });
    let resp = json_parse(lang_call(py, req));
    println(resp["result"]);          // HOLA MUNDO

    // sumar dos números en el otro lenguaje
    let req2 = json_stringify({ "op": "add", "a": 7, "b": 35 });
    let resp2 = json_parse(lang_call(py, req2));
    println(resp2["result"]);         // 42

    lang_close(py);
}`)}

<h2>Lado worker (Python)</h2>
${te(`import sys, json

for line in sys.stdin:
    msg = json.loads(line)
    op = msg.get("op")
    if op == "upper":
        out = {"result": msg["text"].upper()}
    elif op == "add":
        out = {"result": msg["a"] + msg["b"]}
    else:
        out = {"error": "op desconocida"}
    sys.stdout.write(json.dumps(out) + "\\n")
    sys.stdout.flush()`, "worker.py")}

<div class="note"><strong>Clave.</strong> El worker debe hacer <code class="inline">flush()</code> tras cada respuesta, o <code class="inline">lang_call</code> se queda esperando. Cambia <code class="inline">python</code> por <code class="inline">python3</code> según tu sistema.</div>

  <a class="prev" href="#/stdlib">&larr; Stdlib</a>

</div>

PAGES.async = `
<h1>Async / concurrencia</h1>
<p class="lead">TypeEasy tiene un runtime asíncrono cooperativo: puedes lanzar varias tareas de I/O lentas y esperarlas <strong>a la vez</strong>, no una tras otra.</p>

<h2>El patrón</h2>
<ul>
<li><code class="inline">lang_call_async(slot, linea)</code> — escribe la petición y devuelve un <em>handle</em> de tarea (int) sin bloquear.</li>
<li><code class="inline">await_all(a, b, c)</code> — corre el event loop hasta que todas las respuestas llegan; devuelve una lista con los resultados.</li>
<li><code class="inline">now_ms()</code> — milisegundos actuales, útil para medir.</li>
</ul>

<h2>Tres tareas en paralelo</h2>
<p>Tres workers que "duermen" 500 ms cada uno: en secuencia serían ~1500 ms; concurrentes, ~500 ms.</p>
${te(`let cmd = "python worker_slow.py";
let py1 = lang_spawn(cmd);
let py2 = lang_spawn(cmd);
let py3 = lang_spawn(cmd);

let t0 = now_ms();

// cada llamada vuelve de inmediato con un handle
let a = lang_call_async(py1, json_stringify({ "op": "sleep", "ms": 500 }));
let b = lang_call_async(py2, json_stringify({ "op": "sleep", "ms": 500 }));
let c = lang_call_async(py3, json_stringify({ "op": "sleep", "ms": 500 }));

// esperar las tres a la vez
let rs = await_all(a, b, c);

let t1 = now_ms();
println("Tiempo total (ms): " + (t1 - t0));   // ~500, no ~1500

lang_close(py1);
lang_close(py2);
lang_close(py3);`)}
${out("Tiempo total (ms): 512\\nSi fuese secuencial seria ~1500 ms; concurrente es ~500 ms.")}

<div class="note"><strong>Por qué importa.</strong> La diferencia de ~1500 ms a ~500 ms es la prueba de que la concurrencia es real: el event loop sondea los tres procesos al mismo tiempo en vez de bloquearse en cada uno.</div>

</div>
`;

PAGES.linq = `
<h1>LINQ — consultas sobre colecciones</h1>
<p class="lead">TypeEasy trae métodos estilo LINQ para consultar listas de objetos: filtrar, proyectar, ordenar y agregar — todo con lambdas.</p>

<h2>Datos de ejemplo</h2>
${te(`class Producto {
    id : int;
    nombre : string;
    precio : int;
    stock : int;
    __constructor(_id : int, _nombre : string, _precio : int, _stock : int) {
        this.id = _id;
        this.nombre = _nombre;
        this.precio = _precio;
        this.stock = _stock;
    }
}

let productos = [
    new Producto(1, "manzana", 10, 30),
    new Producto(2, "pera",    15, 10),
    new Producto(3, "uva",      8, 50),
    new Producto(4, "mango",   20,  5)
];`)}

<h2>Filtrar y proyectar</h2>
${te(`// where: filtrar por condición
let caros = productos.where(fn(p) => p.precio >= 12);
println("caros = " + caros.length);          // caros = 2

// select: extraer un campo
let nombres = productos.select(fn(p) => p.nombre);
println(nombres.join(","));                   // manzana,pera,uva,mango`)}

<h2>Agregados</h2>
${te(`println("sumStock = "  + productos.sumBy(fn(p) => p.stock));    // 95
println("avgPrecio = " + productos.avgBy(fn(p) => p.precio));   // 13.25
println("countCaros = " + productos.countWhere(fn(p) => p.precio > 10)); // 2

let barato = productos.minBy(fn(p) => p.precio);
println("más barato = " + barato.nombre);     // uva

let caro = productos.maxBy(fn(p) => p.precio);
println("más caro = " + caro.nombre);         // mango`)}

<h2>Ordenar</h2>
${te(`let asc = productos.orderBy(fn(p) => p.precio);
let primero = asc.first();
println("más barato = " + primero.nombre);    // uva

let desc = productos.orderByDescending(fn(p) => p.stock);
let conMasStock = desc.first();
println("más stock = " + conMasStock.nombre); // uva`)}

<h2>Buscar y comprobar</h2>
${te(`let p3 = productos.firstWhere(fn(p) => p.id == 3);
println(p3.nombre);                           // uva

println(productos.all(fn(p) => p.stock > 0)); // true (todos)
println(productos.none(fn(p) => p.precio == 0)); // true (ninguno)`)}

let q2 = q1.orderByDescending(fn(p) => p.precio);
let top = q2.first();
println("top = " + top.nombre);               // pera`)}

<h2>Tipos de datos en parámetros</h2>
<p>El binder estilo Dapper acepta estos tipos de TypeEasy y los traduce a SQL de forma segura (las cadenas se escapan y se entrecomillan; nunca se concatena el valor crudo):</p>

  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td><code>5</code></td></tr>
  <tr><td><code>float</code></td><td><code>{ "@precio": 19.9 }</code></td><td><code>19.9</code></td></tr>
  <tr><td><code>string</code></td><td><code>{ "@nombre": "O'Reilly" }</code></td><td><code>'O''Reilly'</code> (comillas escapadas)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@activo": true }</code></td><td><code>1</code> · <code>false</code> &rarr; <code>0</code> (MySQL no tiene boolean nativo)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@creado": now() }</code></td><td><code>'2026-06-06T04:33:34Z'</code> (string ISO-8601 escapado y entrecomillado)</td></tr>
  <tr><td><code>uuid</code></td><td><code>{ "@id": uuid_v4() }</code></td><td><code>'1d360e11-94d5-4a91-9785-67b134f3911a'</code> (string escapado y entrecomillado)</td></tr>
  <tr><td><code>null</code></td><td><code>{ "@x": null }</code></td><td><code>NULL</code></td></tr>
  <tr><td>objeto / clase</td><td><code>filtro</code></td><td>cada atributo se expone como <code>@id</code>, <code>@nombre</code>…</td></tr>
</table>

<h2>Cerrar</h2>
${te(`mysql_close(conn);`)}

<div class="note"><strong>TLS.</strong> <code class="inline">mysql_connect</code> admite un 6º argumento opcional (map) para opciones TLS — útil para servicios gestionados como TiDB Cloud. Nunca pongas credenciales reales en el código: léelas de variables de entorno con <code class="inline">env_required("DB_PASS")</code>.</div>

<div class="pager">
  <a class="prev" href="#/csv">&larr; Leer CSV</a>
  <a href="#/errors">Manejo de errores &rarr;</a>
</div>
`;

<p class="lead">Aquí brilla TypeEasy: definir y desplegar una API HTTP es trivial.</p>

<h2>Verbos HTTP</h2>
<table class="ref">

<div class="warn"><strong>Importante.</strong> Solo <code class="inline">return json(...)</code> y <code class="inline">return xml(...)</code> llenan el cuerpo de la respuesta. Un <code class="inline">return "texto"</code> simple sale vacío.</div>

<div class="pager">

PAGES.routing = `
<h1>Rutas y parámetros</h1>

<h2>Parámetros de ruta</h2>
<p>Usa <code class="inline">{nombre}</code> en la ruta y léelo con <code class="inline">request_param</code>:</p>
${te(`endpoint {
    [HttpGet("/api/usuarios/{id}")]
    obtener() {
        let id = request_param("id");
        return json({ id: id });

}`)}

${te(`[HttpGet("/api/buscar")]

    let q = request_query("q");
    let pagina = request_query("pagina");
    return json({ buscando: q, pagina: pagina });
}`)}
${sh(`curl "http://localhost:9000/api/buscar?q=zapatos&pagina=2"`)}
${out('{"buscando":"zapatos","pagina":"2"}')}

<h2>Cuerpo de la petición</h2>
${te(`[HttpPost("/api/echo")]
echo() {

    return json(body);
}`)}

${te(`[HttpGet("/api/info")]

    return json({ agente: agente });
}`)}

<table class="ref">
  <tr><th>Builtin</th><th>Lee...</th></tr>
  <tr><td><code>request_param("id")</code></td><td>Parámetro de ruta <code>{id}</code>.</td></tr>
  <tr><td><code>request_query("q")</code></td><td>Query string <code>?q=</code>.</td></tr>
  <tr><td><code>request_body()</code></td><td>Cuerpo crudo de la petición.</td></tr>
  <tr><td><code>request_header("X")</code></td><td>Un header de la petición.</td></tr>
  <tr><td><code>request_cookie("c")</code></td><td>Una cookie de la petición.</td></tr>
</table>

<div class="pager">

</div>

PAGES.json = `
<h1>Respuestas JSON</h1>
<p class="lead">El builtin <code class="inline">json(...)</code> es la forma canónica de responder. Acepta <strong>cuatro</strong> tipos de valor.</p>

<h2>Forma 1 — object literal (recomendada)</h2>
<p>La más legible: pasa un objeto inline. Las claves van <strong>sin comillas</strong>:</p>
${te(`[HttpGet("/api/status")]
status() {
    return json({ ok: true, version: "0.0.18" });
}`)}
${out('{"ok":true,"version":"0.0.18"}')}

<h2>Forma 2 — object literal con interpolación</h2>
<p>Dentro de un valor puedes usar <code class="inline">$"...{expr}..."</code>:</p>
${te(`[HttpGet("/api/doble/{n}")]
doble() {
    var n = to_int(request_param("n"));
    return json({ resultado: $"{n * 2}" });
}`)}
${sh(`curl http://localhost:9000/api/doble/21`)}
${out('{"resultado":"42"}')}

<h2>Forma 3 — string JSON literal</h2>
<p>Útil para respuestas fijas. Recuerda escapar las comillas con <code class="inline">\\\\"</code>:</p>
${te(`[HttpGet("/api/ping")]
ping() {
    return json("{\\"pong\\": 1}");
}`)}

<h2>Forma 4 — concat (construcción dinámica)</h2>
<p>Para armar JSON con variables de forma segura, usa <code class="inline">concat(...)</code> en vez de <code class="inline">+</code>:</p>
${te(`[HttpGet("/api/usuario/{id}")]
usuario() {
    let id = request_param("id");
    let body = concat("{\\"id\\":\\"", id, "\\",\\"name\\":\\"Demo\\"}");
    return json(body);
}`)}
${out('{"id":"42","name":"Demo"}')}

<h2>También: una variable (map o instancia de clase)</h2>
${te(`[HttpPost("/api/users")]
crear(u : User) {
    return json(u);   // serializa el objeto entero
}`)}

<h2>Códigos de estado y headers</h2>
${te(`[HttpGet("/api/recurso/{id}")]
obtener() {
    let id = request_param("id");
    if (id == "0") {
        response_status(404);
        return json({ error: "no encontrado" });
    }
    response_header("X-Custom", "valor");
    return json({ id: id });
}`)}

<table class="ref">
  <tr><th>Builtin</th><th>Hace...</th></tr>
  <tr><td><code>json(value)</code></td><td>Responde JSON. Acepta object literal, string, concat o variable.</td></tr>
  <tr><td><code>xml(value)</code></td><td>Responde XML.</td></tr>
  <tr><td><code>concat(a, b, ...)</code></td><td>Concatena strings de forma segura para el cuerpo.</td></tr>
  <tr><td><code>response_status(n)</code></td><td>Fija el código HTTP.</td></tr>
  <tr><td><code>response_header(k, v)</code></td><td>Agrega un header de respuesta.</td></tr>
</table>

<div class="warn"><strong>Solo <code class="inline">json(...)</code> y <code class="inline">xml(...)</code> llenan el cuerpo.</strong> Un <code class="inline">return "texto"</code> simple produce una respuesta vacía.</div>

<div class="pager">
  <a class="prev" href="#/routing">&larr; Rutas y parámetros</a>
  <a href="#/binding">Model binding &rarr;</a>
</div>
`;

PAGES.binding = `
<h1>Model binding y validación</h1>
<p class="lead">Tipa un parámetro con una clase y TypeEasy parsea y valida el JSON del cuerpo automáticamente.</p>

${te(`class User {
    name : string;
    age  : int;
}

endpoint {
    [HttpPost("/api/users")]
    crear(u : User) {
        // si llega aquí, el body ya fue validado contra User
        return json({ creado: u.name });
    }
}`)}

<h2>Petición válida</h2>
${sh(`curl -X POST http://localhost:9000/api/users \\
  -H "Content-Type: application/json" \\
  -d '{"name":"Ana","age":30}'`)}
${out('{"creado":"Ana"}')}

<h2>Petición inválida &rarr; 422 automático</h2>
<p>Si falta un campo o el tipo no coincide, TypeEasy responde <strong>422</strong> sin ejecutar tu handler:</p>
${sh(`curl -X POST http://localhost:9000/api/users \\
  -H "Content-Type: application/json" \\
  -d '{"name":"Ana"}'`)}
${out('{"error":"validation_failed"}')}

<div class="note"><strong>Requisito.</strong> El cliente debe enviar <code class="inline">Content-Type: application/json</code> y un cuerpo que empiece con <code class="inline">{</code>. Cada atributo de la clase es obligatorio salvo que sea <code class="inline">tipo?</code> (nullable).</div>

<div class="pager">
  <a class="prev" href="#/json">&larr; Respuestas JSON</a>

</div>

PAGES.jwt = `
<h1>Autenticación JWT</h1>
<p class="lead">TypeEasy trae JWT HS256 en el núcleo: firma, verificación y el decorador <code class="inline">@auth</code>.</p>

<h2>Firmar un token (login)</h2>
${te(`class User { name : string; age : int; }

endpoint {
    [HttpPost("/api/login")]
    login(u : User) {
        let secret = env("JWT_SECRET");
        let payload = concat("{\\"sub\\":\\"", u.name, "\\",\\"exp\\":1900000000}");
        let token = jwt_sign(payload, secret);
        return json({ token: token });
    }
}`)}

<h2>Proteger un endpoint con <code class="inline">@auth</code></h2>
<p>Pon <code class="inline">@auth</code> antes del atributo HTTP. El servidor exige un header <code class="inline">Authorization: Bearer &lt;token&gt;</code> válido <em>antes</em> de ejecutar el handler:</p>
${te(`@auth
[HttpGet("/api/perfil")]
perfil() {
    // current_claims() devuelve el payload validado (string JSON)
    return json(concat("{\\"ok\\":true,\\"claims\\":", current_claims(), "}"));
}`)}

<h2>Probarlo</h2>
${sh(`# login -> obtienes un token
curl -X POST http://localhost:9000/api/login \\
  -H "Content-Type: application/json" \\
  -d '{"name":"ana","age":30}'

# usar el token
curl http://localhost:9000/api/perfil \\
  -H "Authorization: Bearer <TOKEN>"

# sin token -> 401 automático
curl -i http://localhost:9000/api/perfil`)}
${out('{"error":"unauthorized"}')}

<div class="note"><strong>Secret.</strong> El secreto se lee de la variable de entorno <code class="inline">JWT_SECRET</code> (la misma para firmar y para <code class="inline">@auth</code>). Genera uno con <code class="inline">openssl rand -base64 48</code> y nunca lo pongas en el código.</div>

<div class="pager">
  <a class="prev" href="#/binding">&larr; Model binding</a>
  <a href="#/cookies">Cookies y sesión &rarr;</a>
</div>
`;

PAGES.cookies = `
<h1>Cookies y sesión</h1>
<p class="lead">Lee cookies con <code class="inline">request_cookie</code> y escríbelas con <code class="inline">response_header("Set-Cookie", ...)</code>.</p>

<h2>Login: setear la cookie</h2>
${te(`[HttpPost("/api/login")]
login() {
    let body = request_body();
    // ... validar credenciales ...
    response_header("Set-Cookie", "user=ana; Path=/; HttpOnly; SameSite=Lax");
    return json({ ok: true });
}`)}

<h2>Endpoint protegido: leer la cookie</h2>
${te(`[HttpGet("/api/perfil")]
perfil() {
    let user = request_cookie("user");
    if (user == "") {
        response_status(401);
        return json({ error: "no_session" });
    }
    return json({ user: user });
}`)}

<h2>Logout: borrar la cookie</h2>
${te(`[HttpPost("/api/logout")]
logout() {
    response_header("Set-Cookie", "user=; Path=/; Max-Age=0");
    return json({ ok: true });
}`)}

<h2>Probar con curl</h2>
${sh(`# login guarda la cookie en cookies.txt
curl -c cookies.txt -X POST http://localhost:9000/api/login

# perfil reenvía la cookie
curl -b cookies.txt http://localhost:9000/api/perfil

# sin cookie -> 401
curl -i http://localhost:9000/api/perfil`)}

<div class="note"><strong>Seguridad.</strong> Usa <code class="inline">HttpOnly</code> (JS no puede leer la cookie, anti-XSS), <code class="inline">SameSite=Lax</code> (mitiga CSRF) y <code class="inline">Secure</code> en producción (solo HTTPS).</div>

<div class="pager">
  <a class="prev" href="#/jwt">&larr; Autenticación JWT</a>
  <a href="#/cors">CORS &rarr;</a>
</div>
`;

PAGES.cors = `
<h1>CORS</h1>
<p class="lead">Permite que tu API sea consumida desde otro dominio (por ejemplo, un frontend SPA). El servidor añade las cabeceras CORS y responde el preflight <code class="inline">OPTIONS</code> automáticamente.</p>

<h2>Configurar varios orígenes con <code class="inline">.env</code></h2>
<p>La forma típica en Docker o despliegues: define <code class="inline">TYPEEASY_CORS_ORIGIN</code> con una <strong>lista separada por comas</strong>. El servidor refleja el <code class="inline">Origin</code> de cada petición si coincide con la lista:</p>
${te(`# .env
TYPEEASY_CORS_ORIGIN=https://app.com, https://admin.app.com, http://localhost:3000`, ".env")}
${sh(`# cargar el .env y levantar
export $(cat .env | xargs)
typeeasy --api mi_api.te --port 9000`)}

<h2>O por línea de comandos</h2>
${sh(`# un solo origen
typeeasy --api mi_api.te --cors-origin "https://app.com"

# varios orígenes (lista separada por comas)
typeeasy --api mi_api.te --cors-origin "https://a.com, https://b.com"

# cualquier origen (default)
typeeasy --api mi_api.te --cors-origin "*"`)}

<h2>Precedencia (mayor gana)</h2>
<table class="ref">
  <tr><th>Forma</th><th>Ejemplo</th><th>Cuándo</th></tr>
  <tr><td>Flag CLI</td><td><code>--cors-origin "https://app.com"</code></td><td>Override puntual.</td></tr>
  <tr><td>Variable de entorno</td><td><code>TYPEEASY_CORS_ORIGIN=https://app.com</code></td><td>Docker / <code>.env</code>.</td></tr>
  <tr><td><code>typeeasy.toml</code></td><td><code>cors_origin = "https://app.com"</code></td><td>Config del proyecto.</td></tr>
  <tr><td>(default)</td><td><code>*</code></td><td>Cualquier dominio.</td></tr>
</table>

<h2>Modos del valor</h2>
<table class="ref">
  <tr><th>Valor</th><th>Comportamiento</th></tr>
  <tr><td><code>*</code></td><td>Cualquier dominio (default).</td></tr>
  <tr><td>un origen</td><td><code>https://app.com</code> — solo ese dominio.</td></tr>
  <tr><td><strong>lista</strong> por comas</td><td><code>https://a.com, https://b.com</code> — refleja el <code>Origin</code> si está en la lista; si no, lo bloquea.</td></tr>
</table>

<p>Cabeceras que envía automáticamente: <code class="inline">Access-Control-Allow-Origin</code>, <code class="inline">Access-Control-Allow-Methods</code> (<code class="inline">GET, POST, PUT, DELETE, PATCH, OPTIONS</code>) y <code class="inline">Access-Control-Allow-Headers</code> (<code class="inline">Content-Type, Authorization</code>).</p>

<div class="pager">
  <a class="prev" href="#/cookies">&larr; Cookies y sesión</a>
  <a href="#/database">Bases de datos &rarr;</a>
</div>
`;

PAGES.database = `
<h1>Bases de datos</h1>
<p class="lead">TypeEasy incluye conectores estilo Dapper para SQLite, MySQL, PostgreSQL y SQL Server. Los parámetros nombrados <code class="inline">@nombre</code> se bindean de forma nativa (inmunes a inyección SQL).</p>

<h2>SQLite (plugin embebido)</h2>
${te(`load_native("sqlite");

let db = sqlite_connect("tienda.db");   // o ":memory:"
sqlite_exec(db, "CREATE TABLE IF NOT EXISTS productos (id INTEGER PRIMARY KEY AUTOINCREMENT, nombre TEXT, precio REAL)");

// INSERT parametrizado: el map de params va como 3er argumento
sqlite_exec(db,
    "INSERT INTO productos(nombre, precio) VALUES(@nombre, @precio)",
    { "@nombre": "Teclado", "@precio": 29.9 });

// SELECT: con params, el formato "json" va como ÚLTIMO argumento
let filas = sqlite_query(db,
    "SELECT * FROM productos WHERE precio > @min",
    { "@min": 10 },
    "json");
println(filas);

// SELECT sin params: formato "json" como 3er argumento
let todas = sqlite_query(db, "SELECT * FROM productos", "json");

let id = sqlite_last_id(db);
sqlite_close(db);`)}

<h2>MySQL</h2>
${te(`let conn = mysql_connect("host", "usuario", "clave", "basedatos", 3306);

let filas = mysql_query(conn,
    "SELECT * FROM usuarios WHERE id = @id",
    { "@id": 5 },
    "json");
println(filas);

mysql_close(conn);`)}

<h2>PostgreSQL</h2>
${te(`let conn = postgres_connect("host", "usuario", "clave", "basedatos", 5432);
let filas = postgres_query(conn, "SELECT * FROM clientes", "json");
postgres_close(conn);`)}

<h2>SQL Server</h2>
${te(`let conn = sqlserver_connect("host", "usuario", "clave", "basedatos", 1433);

let filas = sqlserver_query(conn,
    "SELECT * FROM usuarios WHERE id = @id",
    { "@id": 5 },
    "json");
println(filas);

sqlserver_close(conn);`)}

<h2>Firmas</h2>
<table class="ref">
  <tr><th>Función</th><th>Firma</th></tr>
  <tr><td>Conectar</td><td><code>sqlite_connect(ruta)</code> · <code>mysql_connect(host, user, pass, db, port)</code> · <code>postgres_connect(host, user, pass, db, port)</code> · <code>sqlserver_connect(host, user, pass, db, port)</code></td></tr>
  <tr><td>Ejecutar</td><td><code>sqlite_exec(db, sql)</code> · <code>sqlite_exec(db, sql, {params})</code></td></tr>
  <tr><td>Consultar</td><td><code>sqlite_query(db, sql, "json")</code> · <code>mysql_query(conn, sql, {params}, "json")</code> · <code>postgres_query(conn, sql, {params}, "json")</code> · <code>sqlserver_query(conn, sql, {params}, "json")</code></td></tr>
  <tr><td>Último id</td><td><code>sqlite_last_id(db)</code></td></tr>
  <tr><td>Cerrar</td><td><code>sqlite_close(db)</code> · <code>mysql_close(conn)</code> · <code>postgres_close(conn)</code> · <code>sqlserver_close(conn)</code></td></tr>
</table>

<div class="note"><strong>Mismo binder para los tres servidores.</strong> MySQL, PostgreSQL y SQL Server comparten el binder Dapper de TypeEasy, así que aceptan exactamente los mismos tipos de parámetro (la tabla de más abajo). SQL Server usa el puerto <code class="inline">1433</code> por defecto.</div>

<h2>Tipos de datos en parámetros (SQLite)</h2>
<p>El plugin de SQLite bindea los parámetros de forma nativa (con <code class="inline">sqlite3_bind_*</code>), sin concatenar nada en el SQL:</p>
<table class="ref">
  <tr><th>Tipo TypeEasy</th><th>Ejemplo en el map</th><th>Binding nativo SQLite</th></tr>
  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td>INTEGER (<code>bind_int64</code>)</td></tr>
  <tr><td><code>float</code></td><td><code>{ "@precio": 19.9 }</code></td><td>REAL (<code>bind_double</code>)</td></tr>
  <tr><td><code>string</code></td><td><code>{ "@nombre": "Teclado" }</code></td><td>TEXT (<code>bind_text</code>)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@activo": true }</code></td><td>INTEGER <code>1</code>/<code>0</code> (<code>bind_int64</code>; SQLite no tiene boolean nativo)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@creado": now() }</code></td><td>TEXT (<code>bind_text</code>; string ISO-8601)</td></tr>
  <tr><td><code>uuid</code></td><td><code>{ "@id": uuid_v4() }</code></td><td>TEXT (<code>bind_text</code>; string de 36 chars)</td></tr>
  <tr><td><code>null</code></td><td><code>{ "@x": null }</code></td><td>NULL (<code>bind_null</code>)</td></tr>
</table>

<h2>Tipos de datos en parámetros (MySQL / PostgreSQL / SQL Server)</h2>
<p>Los tres conectores servidor comparten el binder Dapper: aceptan los mismos tipos y los traducen a SQL de forma segura (las cadenas se escapan y se entrecomillan; nunca se concatena el valor crudo):</p>
<table class="ref">
  <tr><th>Tipo TypeEasy</th><th>Ejemplo en el map</th><th>Se interpola como</th></tr>
  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td><code>5</code></td></tr>
  <tr><td><code>float</code></td><td><code>{ "@precio": 19.9 }</code></td><td><code>19.9</code></td></tr>
  <tr><td><code>string</code></td><td><code>{ "@nombre": "O'Reilly" }</code></td><td><code>'O''Reilly'</code> (comillas escapadas)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@activo": true }</code></td><td><code>1</code> / <code>0</code> (sin boolean nativo)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@creado": now() }</code></td><td><code>'2026-06-06T04:33:34Z'</code> (string ISO-8601 escapado y entrecomillado)</td></tr>

PAGES["ex-crud"] = `
<h1>Ejemplo: CRUD completo con SQLite</h1>
<p class="lead">Una API REST funcional de productos, lista para copiar y correr.</p>

${te(`load_native("sqlite");

// bootstrap: tabla de productos
let db = sqlite_connect("tienda.db");
sqlite_exec(db, "CREATE TABLE IF NOT EXISTS productos (id INTEGER PRIMARY KEY AUTOINCREMENT, nombre TEXT, precio REAL)");

class Producto {
    nombre : string;
    precio : float;
}

endpoint {
    // LISTAR
    [HttpGet("/api/productos")]
    listar() {
        let filas = sqlite_query(db, "SELECT * FROM productos", "json");
        return json(filas);
    }

    // OBTENER UNO (parámetro nombrado @id)
    [HttpGet("/api/productos/{id}")]
    obtener() {
        let id = request_param("id");
        let filas = sqlite_query(db,
            "SELECT * FROM productos WHERE id = @id",
            { "@id": id },
            "json");
        return json(filas);
    }

    // CREAR (model binding valida el body contra Producto)
    [HttpPost("/api/productos")]
    crear(p : Producto) {
        sqlite_exec(db,
            "INSERT INTO productos(nombre, precio) VALUES(@n, @pr)",
            { "@n": p.nombre, "@pr": p.precio });
        let id = sqlite_last_id(db);
        response_status(201);
        return json({ id: id });
    }

    // ELIMINAR
    [HttpDelete("/api/productos/{id}")]
    eliminar() {
        let id = request_param("id");
        sqlite_exec(db, "DELETE FROM productos WHERE id = @id", { "@id": id });
        return json({ ok: true });
    }
}`, "productos_api.te")}

<h2>Probarla</h2>
${sh(`typeeasy --api productos_api.te --port 9000

# crear
curl -X POST http://localhost:9000/api/productos \\
  -H "Content-Type: application/json" \\
  -d '{"nombre":"Teclado","precio":29.9}'

# listar
curl http://localhost:9000/api/productos

# eliminar
curl -X DELETE http://localhost:9000/api/productos/1`)}

<div class="note"><strong>Recuerda.</strong> En <code class="inline">sqlite_query</code>, el formato <code class="inline">"json"</code> es el <em>último</em> argumento; si hay parámetros, el map va antes del formato.</div>

<div class="pager">
  <a class="prev" href="#/database">&larr; Bases de datos</a>
  <a href="#/ex-auth">Ejemplo: login JWT &rarr;</a>
</div>
`;

PAGES["ex-auth"] = `
<h1>Ejemplo: API con login JWT</h1>
<p class="lead">Login que emite un token y un endpoint protegido con <code class="inline">@auth</code>.</p>

${te(`class Login { user : string; pass : string; }

endpoint {
    // LOGIN: valida y emite un JWT
    [HttpPost("/api/login")]
    login(c : Login) {
        if (c.user != "ana" || c.pass != "1234") {
            response_status(401);
            return json({ error: "credenciales_invalidas" });
        }
        let secret = env("JWT_SECRET");
        let payload = concat("{\\"sub\\":\\"", c.user, "\\",\\"exp\\":1900000000}");
        let token = jwt_sign(payload, secret);
        return json({ token: token });
    }

    // PERFIL: protegido, requiere Bearer token
    @auth
    [HttpGet("/api/perfil")]
    perfil() {
        return json(concat("{\\"ok\\":true,\\"claims\\":", current_claims(), "}"));
    }
}`, "auth_api.te")}

<h2>Probarla</h2>
${sh(`export JWT_SECRET=$(openssl rand -base64 48)
typeeasy --api auth_api.te --port 9000

# 1) login -> obtienes un token
curl -X POST http://localhost:9000/api/login \\
  -H "Content-Type: application/json" \\
  -d '{"user":"ana","pass":"1234"}'

# 2) usar el token
curl http://localhost:9000/api/perfil \\
  -H "Authorization: Bearer <TOKEN_AQUI>"

# 3) sin token -> 401
curl -i http://localhost:9000/api/perfil`)}

<h2>¿Qué aprendiste?</h2>
<ul>
  <li>Validar el body automáticamente con <strong>model binding</strong> (<code class="inline">login(c : Login)</code>).</li>
  <li>Emitir un JWT firmado con <code class="inline">jwt_sign</code> y un secreto de entorno.</li>
  <li>Proteger rutas con <code class="inline">@auth</code> y leer el payload con <code class="inline">current_claims()</code>.</li>
</ul>

<div class="pager">
  <a class="prev" href="#/ex-crud">&larr; Ejemplo: CRUD</a>
  <a href="#/home">Volver al inicio &rarr;</a>
</div>
`;

<h2>Numeric for (count from start to limit)</h2>
<p>TypeEasy has a numeric <code class="inline">for</code> of the form
<code class="inline">for (variable = start; limit; step)</code>. The <strong>second number is the limit (exclusive)</strong>
and the <strong>third is the step</strong> — it is not a condition like in C/JavaScript.</p>
${te(`// count from 0 to 4 (limit 5, step 1)
for (i = 0; 5; 1) {
    println(i);
}`)}
${out("0\\n1\\n2\\n3\\n4")}

<p>With a step of 2:</p>
${te(`for (i = 0; 10; 2) {
    println(i);
}`)}
${out("0\\n2\\n4\\n6\\n8")}

<p>Accumulate into an external variable:</p>
${te(`var sum = 0;
for (i = 1; 5; 1) {
    sum = sum + i;
}
println("sum 1..4 = " + sum);   // 10`)}
${out("sum 1..4 = 10")}

<p>The <strong>limit and step can be variables or expressions</strong> (evaluated once when entering the loop):</p>
${te(`let lim = 4;
let step = 2;
for (i = 0; lim; step) {
    println(i);
}`)}
${out("0\\n2")}

<p>The body can have <strong>several statements</strong>; each runs once per iteration:</p>
${te(`for (i = 0; 3; 1) {
    println("A=" + i);
    println("B=" + i);
}`)}
${out("A=0\\nB=0\\nA=1\\nB=1\\nA=2\\nB=2")}

<p>They can also be nested:</p>
${te(`for (i = 0; 2; 1) {
    for (j = 0; 2; 1) {
        println(i + "," + j);
    }
}`)}
${out("0,0\\n0,1\\n1,0\\n1,1")}

<p>If you need to <strong>start from a variable</strong>, don't put it in the start of the <code class="inline">for</code>
(it would be a syntax error). Initialize it first with <code class="inline">var</code> and use <code class="inline">while</code>:</p>
${te(`let start = 2;
var i = start;          // var (mutable), not let
while (i < 5) {
    println(i);
    i = i + 1;
}`)}
${out("2\\n3\\n4")}

<div class="note"><strong>Numeric for rule.</strong>
<ul>
<li>The <strong>start must be a numeric literal</strong> (<code class="inline">for (i = 0; ...)</code>); a variable in the start is a syntax error. If you need to start at a variable, initialize it first with <code class="inline">var</code> and use <code class="inline">while</code> (see example above).</li>
</ul>
The <strong>limit</strong> and <strong>step</strong> do accept variables/expressions, and the body accepts multiple statements.</div>

<h2>break and continue</h2>
${te(`var i = 0;
while (i < 10) {
    i++;
    if (i == 3) { continue; }   // skip 3
    if (i == 6) { break; }      // stop at 6
    println(i);
}`)}
${out("1\\n2\\n4\\n5")}

<div class="note"><strong>Tip.</strong> To sum, average or filter lists of objects, the idiomatic way in TypeEasy is <a href="#/linq">LINQ</a> (<code class="inline">.sumBy()</code>, <code class="inline">.where()</code>, etc.) instead of a manual loop.</div>

<div class="pager">
  <a class="prev" href="#/if">&larr; Conditionals</a>
  <a href="#/lists">Lists &rarr;</a>
</div>
`;

PAGES.bridge = `
<h1>Bridge to other languages</h1>
<p class="lead">TypeEasy can launch an external program (Python, Node, Java, Rust...) and talk to it over a JSON-lines protocol. This lets you reuse libraries that don't exist in TypeEasy.</p>

<h2>The protocol</h2>
<ul>
<li><code class="inline">lang_spawn(cmd)</code> — opens the process, returns a <em>slot</em> (int). Negative if it fails.</li>
<li><code class="inline">lang_call(slot, line)</code> — sends a line and waits for <strong>one</strong> response line.</li>
<li><code class="inline">lang_send</code> / <code class="inline">lang_recv</code> — separate send and receive.</li>
<li><code class="inline">lang_close(slot)</code> — closes the process.</li>
</ul>
<p>The worker reads JSON from <code class="inline">stdin</code> and replies with JSON on <code class="inline">stdout</code>, one line per message.</p>

<h2>TypeEasy side</h2>
${te(`let py = lang_spawn("python worker.py");

if (py < 0) {
    println("Could not launch the worker.");
} else {
    // ask the worker to uppercase some text
    let req = json_stringify({ "op": "upper", "text": "hello world" });
    let resp = json_parse(lang_call(py, req));
    println(resp["result"]);          // HELLO WORLD

    // add two numbers in the other language
    let req2 = json_stringify({ "op": "add", "a": 7, "b": 35 });
    let resp2 = json_parse(lang_call(py, req2));
    println(resp2["result"]);         // 42

    lang_close(py);
}`)}

<h2>Worker side (Python)</h2>
${te(`import sys, json

for line in sys.stdin:
    msg = json.loads(line)
    op = msg.get("op")
    if op == "upper":
        out = {"result": msg["text"].upper()}
    elif op == "add":
        out = {"result": msg["a"] + msg["b"]}
    else:
        out = {"error": "unknown op"}
    sys.stdout.write(json.dumps(out) + "\\n")
    sys.stdout.flush()`, "worker.py")}

<div class="note"><strong>Key.</strong> The worker must <code class="inline">flush()</code> after each response, or <code class="inline">lang_call</code> blocks forever. Use <code class="inline">python3</code> instead of <code class="inline">python</code> depending on your system.</div>

<div class="pager">
  <a class="prev" href="#/stdlib">&larr; Stdlib</a>
  <a href="#/async">Async &rarr;</a>
</div>
`;

PAGES.async = `
<h1>Async / concurrency</h1>
<p class="lead">TypeEasy has a cooperative async runtime: you can launch several slow I/O tasks and await them <strong>at once</strong>, not one after another.</p>

<h2>The pattern</h2>
<ul>
<li><code class="inline">lang_call_async(slot, line)</code> — writes the request and returns a task <em>handle</em> (int) without blocking.</li>
<li><code class="inline">await_all(a, b, c)</code> — runs the event loop until all responses arrive; returns a list of the results.</li>
<li><code class="inline">now_ms()</code> — current milliseconds, useful for measuring.</li>
</ul>

<h2>Three tasks in parallel</h2>
<p>Three workers that "sleep" 500 ms each: sequentially that would be ~1500 ms; concurrently, ~500 ms.</p>
${te(`let cmd = "python worker_slow.py";
let py1 = lang_spawn(cmd);
let py2 = lang_spawn(cmd);
let py3 = lang_spawn(cmd);

let t0 = now_ms();

// each call returns immediately with a handle
let a = lang_call_async(py1, json_stringify({ "op": "sleep", "ms": 500 }));
let b = lang_call_async(py2, json_stringify({ "op": "sleep", "ms": 500 }));
let c = lang_call_async(py3, json_stringify({ "op": "sleep", "ms": 500 }));

// wait for all three at once
let rs = await_all(a, b, c);

let t1 = now_ms();
println("Total time (ms): " + (t1 - t0));   // ~500, not ~1500

lang_close(py1);
lang_close(py2);
lang_close(py3);`)}
${out("Total time (ms): 512\\nIf it were sequential it would be ~1500 ms; concurrent is ~500 ms.")}

<div class="note"><strong>Why it matters.</strong> The difference from ~1500 ms to ~500 ms proves the concurrency is real: the event loop polls the three processes at the same time instead of blocking on each one.</div>

<div class="pager">
  <a class="prev" href="#/bridge">&larr; Bridge</a>
  <a href="#/first-api">Your first API &rarr;</a>
</div>
`;

PAGES.linq = `
<h1>LINQ — queries over collections</h1>
<p class="lead">TypeEasy ships LINQ-style methods to query lists of objects: filter, project, sort and aggregate — all with lambdas.</p>

<h2>Sample data</h2>
${te(`class Product {
    id : int;
    name : string;
    price : int;
    stock : int;
    __constructor(_id : int, _name : string, _price : int, _stock : int) {
        this.id = _id;
        this.name = _name;
        this.price = _price;
        this.stock = _stock;
    }
}

let products = [
    new Product(1, "apple", 10, 30),
    new Product(2, "pear",  15, 10),
    new Product(3, "grape",  8, 50),
    new Product(4, "mango", 20,  5)
];`)}

<h2>Filter and project</h2>
${te(`// where: filter by condition
let expensive = products.where(fn(p) => p.price >= 12);
println("expensive = " + expensive.length);    // expensive = 2

// select: extract a field
let names = products.select(fn(p) => p.name);
println(names.join(","));                       // apple,pear,grape,mango`)}

<h2>Aggregates</h2>
${te(`println("sumStock = "  + products.sumBy(fn(p) => p.stock));    // 95
println("avgPrice = "  + products.avgBy(fn(p) => p.price));    // 13.25
println("countExpensive = " + products.countWhere(fn(p) => p.price > 10)); // 2

let cheapest = products.minBy(fn(p) => p.price);
println("cheapest = " + cheapest.name);        // grape

let priciest = products.maxBy(fn(p) => p.price);
println("priciest = " + priciest.name);        // mango`)}

<h2>Sort</h2>
${te(`let asc = products.orderBy(fn(p) => p.price);
let first = asc.first();
println("cheapest = " + first.name);           // grape

let desc = products.orderByDescending(fn(p) => p.stock);
let mostStock = desc.first();
println("most stock = " + mostStock.name);     // grape`)}

<h2>Search and check</h2>
${te(`let p3 = products.firstWhere(fn(p) => p.id == 3);
println(p3.name);                              // grape

println(products.all(fn(p) => p.stock > 0));   // true (all)
println(products.none(fn(p) => p.price == 0)); // true (none)`)}

<h2>Chain queries</h2>
<p>Chain with intermediate variables (one step per line):</p>
${te(`let q1 = products.where(fn(p) => p.stock >= 10);
let q2 = q1.orderByDescending(fn(p) => p.price);
let top = q2.first();
println("top = " + top.name);                  // pear`)}

<h2>Available methods</h2>
<table class="ref">
  <tr><th>Method</th><th>Returns</th></tr>
  <tr><td><code>.where(fn)</code></td><td>Filtered list.</td></tr>
  <tr><td><code>.select(fn)</code></td><td>Projected list.</td></tr>
  <tr><td><code>.orderBy(fn)</code> / <code>.orderByDescending(fn)</code></td><td>Sorted list.</td></tr>
  <tr><td><code>.sumBy(fn)</code> / <code>.avgBy(fn)</code></td><td>Number.</td></tr>
  <tr><td><code>.minBy(fn)</code> / <code>.maxBy(fn)</code></td><td>The min / max element.</td></tr>
  <tr><td><code>.countWhere(fn)</code></td><td>Count that matches.</td></tr>

PAGES.mysql = `
<h1>MySQL</h1>
<p class="lead">TypeEasy talks to MySQL (and compatibles like TiDB or MariaDB) with a Dapper-like style: parameterized queries with named parameters.</p>

<h2>Connect</h2>
<p>The signature is <code class="inline">mysql_connect(host, user, password, db, port)</code> and returns a connection.</p>
${te(`let conn = mysql_connect("127.0.0.1", "root", "secret", "shop", 3306);`)}

<h2>SELECT with named parameters</h2>
<p>Parameters start with <code class="inline">@</code> and are passed in a map. The last argument <code class="inline">"json"</code> sets the result format.</p>
${te(`let rows = mysql_query(
    conn,
    "SELECT name, price FROM products WHERE price > @min AND name LIKE @pat",
    { "@min": 1, "@pat": "%a%" },
    "json"
);
println(rows);`)}

<h2>Parameterized INSERT / UPDATE</h2>
<p>Without the format argument the statement is executed (quotes are escaped automatically):</p>
${te(`mysql_query(
    conn,
    "INSERT INTO products (name, price) VALUES (@name, @price)",
    { "@name": "O'Reilly Book", "@price": 19.9 }
);

mysql_query(
    conn,
    "UPDATE products SET price = @new WHERE name = @name",
    { "@new": 25, "@name": "O'Reilly Book" }
);`)}

<h2>Use an object as the parameter container</h2>
<p>You can pass an object instead of the map: its attributes are exposed as <code class="inline">@id</code>, <code class="inline">@name</code>, etc.</p>
${te(`class ProductFilter {
    id: int;
    name: string;
    price: float;
    __constructor(_id: int, _name: string, _price: float) {
        this.id = _id;
        this.name = _name;
        this.price = _price;
    }
}

let filter = new ProductFilter(1, "O'Reilly Book", 19.9);

let r = mysql_query(
    conn,
    "SELECT * FROM products WHERE id = @id OR name = @name",
    filter,
    "json"
);
println(r);`)}

<h2>Data types in parameters</h2>
<p>The Dapper-style binder accepts these TypeEasy types and translates them to SQL safely (strings are escaped and quoted; the raw value is never concatenated):</p>
<table class="ref">
  <tr><th>TypeEasy type</th><th>Example in the map</th><th>Interpolated as</th></tr>
  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td><code>5</code></td></tr>
  <tr><td><code>float</code></td><td><code>{ "@price": 19.9 }</code></td><td><code>19.9</code></td></tr>
  <tr><td><code>string</code></td><td><code>{ "@name": "O'Reilly" }</code></td><td><code>'O''Reilly'</code> (quotes escaped)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@active": true }</code></td><td><code>1</code> · <code>false</code> &rarr; <code>0</code> (MySQL has no native boolean)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@created": now() }</code></td><td><code>'2026-06-06T04:33:34Z'</code> (ISO-8601 string, escaped and quoted)</td></tr>
  <tr><td><code>uuid</code></td><td><code>{ "@id": uuid_v4() }</code></td><td><code>'1d360e11-94d5-4a91-9785-67b134f3911a'</code> (string, escaped and quoted)</td></tr>
  <tr><td><code>null</code></td><td><code>{ "@x": null }</code></td><td><code>NULL</code></td></tr>
  <tr><td>object / class</td><td><code>filter</code></td><td>each attribute is exposed as <code>@id</code>, <code>@name</code>…</td></tr>
</table>

<h2>Close</h2>
${te(`mysql_close(conn);`)}

<div class="note"><strong>TLS.</strong> <code class="inline">mysql_connect</code> accepts an optional 6th argument (map) for TLS options — useful for managed services like TiDB Cloud. Never put real credentials in code: read them from environment variables with <code class="inline">env_required("DB_PASS")</code>.</div>

  <a class="prev" href="#/csv">&larr; Read CSV</a>
  <a href="#/errors">Error handling &rarr;</a>
</div>
`;

PAGES.json = `
<h1>JSON responses</h1>
<p class="lead">The <code class="inline">json(...)</code> builtin is the canonical way to respond. It accepts <strong>four</strong> kinds of value.</p>

<h2>Form 1 — object literal (recommended)</h2>
<p>The most readable: pass an inline object. Keys go <strong>without quotes</strong>:</p>
${te(`[HttpGet("/api/status")]
status() {
    return json({ ok: true, version: "0.0.18" });
}`)}
${out('{"ok":true,"version":"0.0.18"}')}

<h2>Form 2 — object literal with interpolation</h2>
<p>Inside a value you can use <code class="inline">$"...{expr}..."</code>:</p>
${te(`[HttpGet("/api/double/{n}")]
double() {
    var n = to_int(request_param("n"));
    return json({ result: $"{n * 2}" });
}`)}
${sh(`curl http://localhost:9000/api/double/21`)}
${out('{"result":"42"}')}

<h2>Form 3 — literal JSON string</h2>
<p>Useful for fixed responses. Remember to escape quotes with <code class="inline">\\\\"</code>:</p>
${te(`[HttpGet("/api/ping")]
ping() {
    return json("{\\"pong\\": 1}");
}`)}

<h2>Form 4 — concat (dynamic building)</h2>
<p>To build JSON with variables safely, use <code class="inline">concat(...)</code> instead of <code class="inline">+</code>:</p>
${te(`[HttpGet("/api/user/{id}")]
user() {
    let id = request_param("id");
    let body = concat("{\\"id\\":\\"", id, "\\",\\"name\\":\\"Demo\\"}");
    return json(body);
}`)}
${out('{"id":"42","name":"Demo"}')}

<h2>Also: a variable (map or class instance)</h2>
${te(`[HttpPost("/api/users")]
create(u : User) {
    return json(u);   // serializes the whole object
}`)}

<h2>Status codes and headers</h2>
${te(`[HttpGet("/api/resource/{id}")]
get() {
    let id = request_param("id");
    if (id == "0") {
        response_status(404);
        return json({ error: "not found" });
    }
    response_header("X-Custom", "value");
    return json({ id: id });
}`)}

<table class="ref">
  <tr><th>Builtin</th><th>Does...</th></tr>
  <tr><td><code>json(value)</code></td><td>Responds JSON. Accepts object literal, string, concat or variable.</td></tr>
  <tr><td><code>xml(value)</code></td><td>Responds XML.</td></tr>
  <tr><td><code>concat(a, b, ...)</code></td><td>Concatenates strings safely for the body.</td></tr>
  <tr><td><code>response_status(n)</code></td><td>Sets the HTTP code.</td></tr>
  <tr><td><code>response_header(k, v)</code></td><td>Adds a response header.</td></tr>
</table>

<div class="warn"><strong>Only <code class="inline">json(...)</code> and <code class="inline">xml(...)</code> fill the body.</strong> A plain <code class="inline">return "text"</code> produces an empty response.</div>

PAGES.jwt = `
<h1>JWT authentication</h1>
<p class="lead">TypeEasy ships HS256 JWT in the core: signing, verification and the <code class="inline">@auth</code> decorator.</p>

<h2>Sign a token (login)</h2>
${te(`class User { name : string; age : int; }

endpoint {
    [HttpPost("/api/login")]
    login(u : User) {
        let secret = env("JWT_SECRET");
        let payload = concat("{\\"sub\\":\\"", u.name, "\\",\\"exp\\":1900000000}");
        let token = jwt_sign(payload, secret);
        return json({ token: token });
    }
}`)}

<h2>Protect an endpoint with <code class="inline">@auth</code></h2>
<p>Put <code class="inline">@auth</code> before the HTTP attribute. The server requires a valid <code class="inline">Authorization: Bearer &lt;token&gt;</code> header <em>before</em> running the handler:</p>
${te(`@auth
[HttpGet("/api/profile")]
profile() {
    // current_claims() returns the validated payload (JSON string)
    return json(concat("{\\"ok\\":true,\\"claims\\":", current_claims(), "}"));
}`)}

<h2>Test it</h2>
${sh(`# login -> you get a token
curl -X POST http://localhost:9000/api/login \\
  -H "Content-Type: application/json" \\
  -d '{"name":"ann","age":30}'

# use the token
curl http://localhost:9000/api/profile \\
  -H "Authorization: Bearer <TOKEN>"

# without a token -> automatic 401
curl -i http://localhost:9000/api/profile`)}
${out('{"error":"unauthorized"}')}

<div class="note"><strong>Secret.</strong> The secret is read from the <code class="inline">JWT_SECRET</code> environment variable (the same one to sign and for <code class="inline">@auth</code>). Generate one with <code class="inline">openssl rand -base64 48</code> and never put it in code.</div>

<div class="pager">
  <a class="prev" href="#/binding">&larr; Model binding</a>
  <a href="#/cookies">Cookies & session &rarr;</a>
</div>
`;

<h1>Cookies and session</h1>
<p class="lead">Read cookies with <code class="inline">request_cookie</code> and write them with <code class="inline">response_header("Set-Cookie", ...)</code>.</p>

<h2>Login: set the cookie</h2>
${te(`[HttpPost("/api/login")]
login() {
    let body = request_body();
    // ... validate credentials ...
    response_header("Set-Cookie", "user=ann; Path=/; HttpOnly; SameSite=Lax");
    return json({ ok: true });
}`)}

<h2>Protected endpoint: read the cookie</h2>
${te(`[HttpGet("/api/profile")]
profile() {
    let user = request_cookie("user");
    if (user == "") {
        response_status(401);
        return json({ error: "no_session" });
    }
    return json({ user: user });
}`)}

<h2>Logout: clear the cookie</h2>
${te(`[HttpPost("/api/logout")]
logout() {
    response_header("Set-Cookie", "user=; Path=/; Max-Age=0");
    return json({ ok: true });
}`)}

<h2>Test with curl</h2>
${sh(`# login saves the cookie to cookies.txt

# without a cookie -> 401
curl -i http://localhost:9000/api/profile`)}

<h1>CORS</h1>
<p class="lead">Allow your API to be consumed from another domain (for example, an SPA frontend). The server adds the CORS headers and answers the <code class="inline">OPTIONS</code> preflight automatically.</p>

<h2>Configure multiple origins with <code class="inline">.env</code></h2>
<p>The typical way in Docker or deployments: set <code class="inline">TYPEEASY_CORS_ORIGIN</code> with a <strong>comma-separated list</strong>. The server reflects each request's <code class="inline">Origin</code> if it matches the list:</p>
${te(`# .env
TYPEEASY_CORS_ORIGIN=https://app.com, https://admin.app.com, http://localhost:3000`, ".env")}
${sh(`# load the .env and start
export $(cat .env | xargs)
typeeasy --api my_api.te --port 9000`)}

<h2>Or via command line</h2>
${sh(`# a single origin
typeeasy --api my_api.te --cors-origin "https://app.com"

# multiple origins (comma-separated list)
typeeasy --api my_api.te --cors-origin "https://a.com, https://b.com"

# any origin (default)
typeeasy --api my_api.te --cors-origin "*"`)}

<h2>Precedence (higher wins)</h2>
<table class="ref">
  <tr><th>Form</th><th>Example</th><th>When</th></tr>
  <tr><td>CLI flag</td><td><code>--cors-origin "https://app.com"</code></td><td>One-off override.</td></tr>
  <tr><td>Environment variable</td><td><code>TYPEEASY_CORS_ORIGIN=https://app.com</code></td><td>Docker / <code>.env</code>.</td></tr>
  <tr><td><code>typeeasy.toml</code></td><td><code>cors_origin = "https://app.com"</code></td><td>Project config.</td></tr>
  <tr><td>(default)</td><td><code>*</code></td><td>Any domain.</td></tr>
</table>

<h2>Value modes</h2>
<table class="ref">
  <tr><th>Value</th><th>Behavior</th></tr>
  <tr><td><code>*</code></td><td>Any domain (default).</td></tr>
  <tr><td>one origin</td><td><code>https://app.com</code> — that domain only.</td></tr>
  <tr><td><strong>comma list</strong></td><td><code>https://a.com, https://b.com</code> — reflects the <code>Origin</code> if it's in the list; otherwise blocks it.</td></tr>
</table>

let db = sqlite_connect("shop.db");     // or ":memory:"

    "SELECT * FROM products WHERE price > @min",
    { "@min": 10 },
    "json");
println(rows);

// SELECT without params: "json" format as the 3rd argument
let all = sqlite_query(db, "SELECT * FROM products", "json");

let id = sqlite_last_id(db);
sqlite_close(db);`)}

    "json");
println(rows);

    { "@id": 5 },

  <tr><th>TypeEasy type</th><th>Example in the map</th><th>Native SQLite binding</th></tr>
  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td>INTEGER (<code>bind_int64</code>)</td></tr>
  <tr><td><code>float</code></td><td><code>{ "@price": 19.9 }</code></td><td>REAL (<code>bind_double</code>)</td></tr>
  <tr><td><code>string</code></td><td><code>{ "@name": "Keyboard" }</code></td><td>TEXT (<code>bind_text</code>)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@active": true }</code></td><td>INTEGER <code>1</code>/<code>0</code> (<code>bind_int64</code>; SQLite has no native boolean)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@created": now() }</code></td><td>TEXT (<code>bind_text</code>; ISO-8601 string)</td></tr>
  <tr><td><code>uuid</code></td><td><code>{ "@id": uuid_v4() }</code></td><td>TEXT (<code>bind_text</code>; 36-char string)</td></tr>
  <tr><td><code>null</code></td><td><code>{ "@x": null }</code></td><td>NULL (<code>bind_null</code>)</td></tr>
</table>

<h2>Data types in parameters (MySQL / PostgreSQL / SQL Server)</h2>
<p>The three server connectors share the Dapper binder: they accept the same types and translate them to SQL safely (strings are escaped and quoted; the raw value is never concatenated):</p>
<table class="ref">
  <tr><th>TypeEasy type</th><th>Example in the map</th><th>Interpolated as</th></tr>
  <tr><td><code>int</code></td><td><code>{ "@id": 5 }</code></td><td><code>5</code></td></tr>
  <tr><td><code>float</code></td><td><code>{ "@price": 19.9 }</code></td><td><code>19.9</code></td></tr>
  <tr><td><code>string</code></td><td><code>{ "@name": "O'Reilly" }</code></td><td><code>'O''Reilly'</code> (quotes escaped)</td></tr>
  <tr><td><code>bool</code></td><td><code>{ "@active": true }</code></td><td><code>1</code> / <code>0</code> (no native boolean)</td></tr>
  <tr><td><code>date</code> / <code>datetime</code></td><td><code>{ "@created": now() }</code></td><td><code>'2026-06-06T04:33:34Z'</code> (escaped, quoted ISO-8601 string)</td></tr>
  <tr><td><code>uuid</code></td><td><code>{ "@id": uuid_v4() }</code></td><td><code>'1d360e11-94d5-4a91-9785-67b134f3911a'</code> (escaped, quoted string)</td></tr>
  <tr><td><code>null</code></td><td><code>{ "@x": null }</code></td><td><code>NULL</code></td></tr>
  <tr><td>object / class</td><td><code>filter</code></td><td>each attribute is exposed as <code>@id</code>, <code>@name</code>…</td></tr>
</table>

<div class="note"><strong>Safe parameters.</strong> The map keys can go with or without <code class="inline">@</code> (<code class="inline">{ "@id": 1 }</code> or <code class="inline">{ "id": 1 }</code>). Never concatenate values directly into the SQL.</div>

<div class="pager">
  <a class="prev" href="#/cors">&larr; CORS</a>
  <a href="#/ex-crud">Example: CRUD &rarr;</a>
</div>
`;

PAGES["ex-crud"] = `
<h1>Example: full CRUD with SQLite</h1>
<p class="lead">A working REST API for products, ready to copy and run.</p>

${te(`load_native("sqlite");

// bootstrap: products table
let db = sqlite_connect("shop.db");
sqlite_exec(db, "CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT, price REAL)");

class Product {
    name  : string;
    price : float;
}

endpoint {
    // LIST
    [HttpGet("/api/products")]
    list() {
        let rows = sqlite_query(db, "SELECT * FROM products", "json");
        return json(rows);
    }

    // GET ONE (named parameter @id)
    [HttpGet("/api/products/{id}")]
    get() {
        let id = request_param("id");
        let rows = sqlite_query(db,
            "SELECT * FROM products WHERE id = @id",
            { "@id": id },
            "json");
        return json(rows);
    }

    // CREATE (model binding validates the body against Product)
    [HttpPost("/api/products")]
    create(p : Product) {
        sqlite_exec(db,
            "INSERT INTO products(name, price) VALUES(@n, @pr)",
            { "@n": p.name, "@pr": p.price });
        let id = sqlite_last_id(db);
        response_status(201);
        return json({ id: id });
    }

    // DELETE
    [HttpDelete("/api/products/{id}")]
    remove() {
        let id = request_param("id");
        sqlite_exec(db, "DELETE FROM products WHERE id = @id", { "@id": id });
        return json({ ok: true });
    }
}`, "products_api.te")}

<h2>Try it</h2>
${sh(`typeeasy --api products_api.te --port 9000

# create
curl -X POST http://localhost:9000/api/products \\
  -H "Content-Type: application/json" \\
  -d '{"name":"Keyboard","price":29.9}'

# list
curl http://localhost:9000/api/products

# delete
curl -X DELETE http://localhost:9000/api/products/1`)}

<div class="note"><strong>Remember.</strong> In <code class="inline">sqlite_query</code>, the <code class="inline">"json"</code> format is the <em>last</em> argument; if there are parameters, the map goes before the format.</div>

<div class="pager">
  <a class="prev" href="#/database">&larr; Databases</a>
  <a href="#/ex-auth">Example: JWT login &rarr;</a>
</div>
`;

PAGES["ex-auth"] = `
<h1>Example: API with JWT login</h1>
<p class="lead">A login that issues a token and an endpoint protected with <code class="inline">@auth</code>.</p>

${te(`class Login { user : string; pass : string; }

endpoint {
    // LOGIN: validates and issues a JWT
    [HttpPost("/api/login")]
    login(c : Login) {
        if (c.user != "ann" || c.pass != "1234") {
            response_status(401);
            return json({ error: "invalid_credentials" });
        }
        let secret = env("JWT_SECRET");
        let payload = concat("{\\"sub\\":\\"", c.user, "\\",\\"exp\\":1900000000}");
        let token = jwt_sign(payload, secret);
        return json({ token: token });
    }

    // PROFILE: protected, requires a Bearer token
    @auth
    [HttpGet("/api/profile")]
    profile() {
        return json(concat("{\\"ok\\":true,\\"claims\\":", current_claims(), "}"));
    }
}`, "auth_api.te")}

<h2>Try it</h2>
${sh(`export JWT_SECRET=$(openssl rand -base64 48)
typeeasy --api auth_api.te --port 9000

# 1) login -> you get a token
curl -X POST http://localhost:9000/api/login \\
  -H "Content-Type: application/json" \\
  -d '{"user":"ann","pass":"1234"}'

# 2) use the token
curl http://localhost:9000/api/profile \\
  -H "Authorization: Bearer <TOKEN_HERE>"

# 3) without a token -> 401
curl -i http://localhost:9000/api/profile`)}

<h2>What did you learn?</h2>
<ul>
  <li>Validate the body automatically with <strong>model binding</strong> (<code class="inline">login(c : Login)</code>).</li>
  <li>Issue a JWT signed with <code class="inline">jwt_sign</code> and an environment secret.</li>
  <li>Protect routes with <code class="inline">@auth</code> and read the payload with <code class="inline">current_claims()</code>.</li>
</ul>

<div class="pager">
  <a class="prev" href="#/ex-crud">&larr; Example: CRUD</a>
  <a href="#/home">Back to home &rarr;</a>
</div>
`;

<script>
/* ============================================================
   ROUTER + SIDEBAR + i18n + THEME
   ============================================================ */
function buildSidebar(){
  const sb = document.getElementById("sidebar");
  let html = "";
  for(const g of NAV){
    html += `<div class="group"><div class="ghead">${g.group}</div>`;
    for(const [slug, label] of g.items){
      html += `<a class="navlink" data-slug="${slug}" href="#/${slug}">${label}</a>`;
    }
    html += `</div>`;
  }
  sb.innerHTML = html;
}

function currentSlug(){
  const h = location.hash.replace(/^#\//, "");
  return h || "home";
}

function activePages(){
  return LANG === "en" ? window.PAGES_EN : window.PAGES_ES;
}

function render(){
  const slug = currentSlug();
  const page = document.getElementById("page");
  const dict = activePages();
  // fall back to ES if a page isn't translated yet, then to home
  page.innerHTML = dict[slug] || window.PAGES_ES[slug] || dict.home || window.PAGES_ES.home;
  // active link
  document.querySelectorAll(".navlink").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("data-slug") === slug);
  });
  document.body.classList.remove("nav-open");
  window.scrollTo(0,0);
  const active = document.querySelector(".navlink.active");
  if(active) active.scrollIntoView({block:"nearest"});
}

/* ---- i18n ---- */
function applyUIStrings(){
  const t = window.I18N[LANG];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(t[k] !== undefined) el.textContent = t[k];
  });
  document.documentElement.setAttribute("lang", LANG);
  const lt = document.getElementById("langToggle");
  if(lt) lt.textContent = LANG.toUpperCase();
}

function setLang(lang){
  LANG = (lang === "en") ? "en" : "es";
  window.LANG = LANG;
  localStorage.setItem("te_lang", LANG);
  NAV = (LANG === "en") ? window.NAV_EN : window.NAV_ES;
  window.NAV = NAV;
  applyUIStrings();
  buildSidebar();
  render();
}

/* ---- theme ---- */
function applyTheme(theme){
  const dark = (theme === "dark");
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  localStorage.setItem("te_theme", dark ? "dark" : "light");
  const tt = document.getElementById("themeToggle");
  if(tt) tt.textContent = dark ? "☀️" : "🌙";
}

/* ---- init persisted prefs ---- */
(function initPrefs(){
  const savedLang = localStorage.getItem("te_lang");
  const savedTheme = localStorage.getItem("te_theme");
  applyTheme(savedTheme || "light");
  // setLang builds the sidebar + renders, so call it last
  setLang(savedLang || "es");
})();

document.getElementById("langToggle").addEventListener("click", ()=> setLang(LANG === "es" ? "en" : "es"));
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});
document.getElementById("hamburger").addEventListener("click", ()=> document.body.classList.toggle("nav-open"));
document.getElementById("backdrop").addEventListener("click", ()=> document.body.classList.remove("nav-open"));
window.addEventListener("hashchange", render);
</script>

</body>
</html>
