<h1>Databases</h1>
<p class="lead">TypeEasy includes Dapper-style connectors for SQLite, MySQL, PostgreSQL and SQL Server. Named parameters <code class="inline">@name</code> are bound natively (immune to SQL injection).</p>

<h2>SQLite (embedded plugin)</h2>
${te(`load_native("sqlite");

let db = sqlite_connect("shop.db");     // or ":memory:"
sqlite_exec(db, "CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT, price REAL)");

// parameterized INSERT: the params map goes as the 3rd argument
sqlite_exec(db,
    "INSERT INTO products(name, price) VALUES(@name, @price)",
    { "@name": "Keyboard", "@price": 29.9 });

// SELECT: with params, the "json" format goes as the LAST argument
let rows = sqlite_query(db,
    "SELECT * FROM products WHERE price > @min",
    { "@min": 10 },
    "json");
println(rows);

// SELECT without params: "json" format as the 3rd argument
let all = sqlite_query(db, "SELECT * FROM products", "json");

let id = sqlite_last_id(db);
sqlite_close(db);`)}

<h2>MySQL</h2>
${te(`let conn = mysql_connect("host", "user", "pass", "database", 3306);

let rows = mysql_query(conn,
    "SELECT * FROM users WHERE id = @id",
    { "@id": 5 },
    "json");
println(rows);

mysql_close(conn);`)}

<h2>PostgreSQL</h2>
${te(`let conn = postgres_connect("host", "user", "pass", "database", 5432);
let rows = postgres_query(conn, "SELECT * FROM customers", "json");
postgres_close(conn);`)}

<h2>SQL Server</h2>
${te(`let conn = sqlserver_connect("host", "user", "pass", "database", 1433);

let rows = sqlserver_query(conn,
    "SELECT * FROM users WHERE id = @id",
    { "@id": 5 },
    "json");
println(rows);

sqlserver_close(conn);`)}

<h2>Signatures</h2>
<table class="ref">
  <tr><th>Function</th><th>Signature</th></tr>
  <tr><td>Connect</td><td><code>sqlite_connect(path)</code> · <code>mysql_connect(host, user, pass, db, port)</code> · <code>postgres_connect(host, user, pass, db, port)</code> · <code>sqlserver_connect(host, user, pass, db, port)</code></td></tr>

PAGES["async-endpoint"] = `
<h1>Async/await endpoint <span class="ver" style="vertical-align:middle">v0.0.20</span></h1>
<p class="lead">An endpoint can be declared in <strong>two ways</strong> — with or without <code class="inline">async</code> — just like in C#/.NET. The keyword changes the runtime behavior: <strong>concurrent</strong> vs <strong>blocking</strong>.</p>

<h2>The two forms</h2>
<ul>
<li><code class="inline">async handler() { ... }</code> — when it reaches an <code class="inline">await</code>, the handler <strong>releases</strong> the interpreter lock, so other requests make progress while this one waits. Concurrent requests <strong>overlap</strong> (like a .NET <code class="inline">async</code> method).</li>
<li><code class="inline">handler() { ... }</code> (no <code class="inline">async</code>) — it <strong>keeps</strong> the lock across the <code class="inline">await</code>, so concurrent requests <strong>serialise</strong> (like a synchronous method).</li>
</ul>
<div class="note"><strong>Same syntax, same concept as .NET.</strong> Both forms parse and run; the only thing that changes is whether the handler yields its turn while waiting.</div>

<h2>Side by side</h2>
<p>Both handlers do exactly the same slow work (spawn a worker that sleeps 500 ms and await it). They differ only in the <code class="inline">async</code> modifier.</p>
${te(`endpoint {
    // CONCURRENT: releases the lock on await -> requests overlap
    [HttpGet("/slow/{tok}")]
    async slow() {
        let tok = request_param("tok");
        let p = lang_spawn(env("WORKER"));
        let a = lang_call_async(p, concat("{\\"op\\":\\"sleep\\",\\"ms\\":500,\\"payload\\":\\"", tok, "\\"}"));
        let rs = await_all(a);
        lang_close(p);
        return json(concat("{\\"tok\\":\\"", tok, "\\",\\"reply\\":", rs[0], "}"));
    }

    // BLOCKING: same work, NO async -> requests serialise
    [HttpGet("/slowsync/{tok}")]
    slow_sync() {
        let tok = request_param("tok");
        let p = lang_spawn(env("WORKER"));
        let a = lang_call_async(p, concat("{\\"op\\":\\"sleep\\",\\"ms\\":500,\\"payload\\":\\"", tok, "\\"}"));
        let rs = await_all(a);
        lang_close(p);
        return json(concat("{\\"tok\\":\\"", tok, "\\",\\"reply\\":", rs[0], "}"));
    }
}`, "async_endpoint.te")}

<h2>The difference is measurable</h2>
<p>Four parallel requests to each endpoint. With <code class="inline">async</code> they overlap (~1× the latency of one); without <code class="inline">async</code> they queue up (~4×):</p>
${sh(`# 4 concurrent requests to the ASYNC endpoint -> overlap
time (for t in a b c d; do curl -s localhost:9000/slow/$t & done; wait)`)}
${out("real  ~1.0s   (4 x 500ms overlapped)")}
${sh(`# 4 concurrent requests to the PLAIN endpoint -> serialise
time (for t in a b c d; do curl -s localhost:9000/slowsync/$t & done; wait)`)}
${out("real  ~2.6s   (4 x 500ms in a row)")}

<div class="note"><strong>Covered by CI.</strong> The test <code class="inline">tests/api/run_async_overlap_test.py</code> (part of the regression suite) asserts both directions: the <code class="inline">async</code> handler overlaps (~2–2.7×) and the plain one serialises (~1×).</div>

<table class="ref">
  <tr><th>Form</th><th>On <code>await</code></th><th>Concurrent requests</th><th>.NET analog</th></tr>
  <tr><td><code>async handler()</code></td><td>releases the lock</td><td>overlap (concurrent)</td><td><code>async</code> method</td></tr>
  <tr><td><code>handler()</code></td><td>keeps the lock</td><td>serialise (blocking)</td><td>synchronous method</td></tr>
</table>

<div class="note"><strong>When to use which?</strong> Use <code class="inline">async</code> when the handler waits on I/O (another API, a database, a worker) and you want the server to keep serving other clients. Use the plain form when you need to serialise access to a shared resource.</div>

<p class="lead">A login that issues a token and an endpoint protected with <code class="inline">@auth</code>.</p>

        return json(concat("{\\"ok\\":true,\\"claims\\":", current_claims(), "}"));
    }

<script>
/* ============================================================
   ROUTER + SIDEBAR + i18n + THEME
   ============================================================ */
function buildSidebar(){
  const sb = document.getElementById("sidebar");
  let html = "";
  for(const g of NAV){
    html += `<div class="group"><div class="ghead">${g.group}</div>`;
    for(const [slug, label] of g.items){
      html += `<a class="navlink" data-slug="${slug}" href="#/${slug}">${label}</a>`;
    }
    html += `</div>`;
  }
  sb.innerHTML = html;
}

function currentSlug(){
  const h = location.hash.replace(/^#\//, "");
  return h || "home";
}

function activePages(){
  return LANG === "en" ? window.PAGES_EN : window.PAGES_ES;
}

function render(){
  const slug = currentSlug();
  const page = document.getElementById("page");
  const dict = activePages();
  // fall back to ES if a page isn't translated yet, then to home
  page.innerHTML = dict[slug] || window.PAGES_ES[slug] || dict.home || window.PAGES_ES.home;
  // active link
  document.querySelectorAll(".navlink").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("data-slug") === slug);
  });
  document.body.classList.remove("nav-open");
  window.scrollTo(0,0);
  const active = document.querySelector(".navlink.active");
  if(active) active.scrollIntoView({block:"nearest"});
}

/* ---- i18n ---- */
function applyUIStrings(){
  const t = window.I18N[LANG];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(t[k] !== undefined) el.textContent = t[k];
  });
  document.documentElement.setAttribute("lang", LANG);
  const lt = document.getElementById("langToggle");
  if(lt) lt.textContent = LANG.toUpperCase();
}

function setLang(lang){
  LANG = (lang === "en") ? "en" : "es";
  window.LANG = LANG;
  localStorage.setItem("te_lang", LANG);
  NAV = (LANG === "en") ? window.NAV_EN : window.NAV_ES;
  window.NAV = NAV;
  applyUIStrings();
  buildSidebar();
  render();
}

/* ---- theme ---- */
function applyTheme(theme){
  const dark = (theme === "dark");
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  localStorage.setItem("te_theme", dark ? "dark" : "light");
  const tt = document.getElementById("themeToggle");
  if(tt) tt.textContent = dark ? "☀️" : "🌙";
}

/* ---- init persisted prefs ---- */
(function initPrefs(){
  const savedLang = localStorage.getItem("te_lang");
  const savedTheme = localStorage.getItem("te_theme");
  applyTheme(savedTheme || "light");
  // setLang builds the sidebar + renders, so call it last
  setLang(savedLang || "es");
})();

document.getElementById("langToggle").addEventListener("click", ()=> setLang(LANG === "es" ? "en" : "es"));
document.getElementById("themeToggle").addEventListener("click", ()=>{
