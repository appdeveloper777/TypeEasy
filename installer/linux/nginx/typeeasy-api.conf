# Nginx reverse proxy + load balancer para TypeEasy --api
#
# Patron 80/20 para escalar:
#   - Levantas N instancias de typeeasy-api en puertos distintos:
#       sudo systemctl enable --now typeeasy-api@9001
#       sudo systemctl enable --now typeeasy-api@9002
#       sudo systemctl enable --now typeeasy-api@9003
#       sudo systemctl enable --now typeeasy-api@9004
#   - Nginx hace round-robin entre ellas, termina TLS, gzip, rate-limit.
#
# Instalar:
#   sudo cp typeeasy-api.conf /etc/nginx/sites-available/typeeasy-api
#   sudo ln -s /etc/nginx/sites-available/typeeasy-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream typeeasy_api {
    least_conn;
    server 127.0.0.1:9001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9003 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9004 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Rate limit basico: 50 req/s por IP, burst 100.
limit_req_zone $binary_remote_addr zone=typeeasy_rl:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Para HTTPS, agregar:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;

    access_log /var/log/nginx/typeeasy-api.access.log;
    error_log  /var/log/nginx/typeeasy-api.error.log;

    # Tamanio max del body (ajusta segun necesidad).
    client_max_body_size 8m;

    gzip on;
    gzip_types application/json application/xml text/plain text/xml;
    gzip_min_length 256;

    location / {
        limit_req zone=typeeasy_rl burst=100 nodelay;

        proxy_pass http://typeeasy_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Failover: si una instancia esta caida o tarda, prueba la siguiente.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}
