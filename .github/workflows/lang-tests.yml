name: lang-tests

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/lang/**'
      - 'tests/api/**'
      - 'tests/fuzz/**'
      - 'typeeasycode/endpoint.te'
      - 'tools/te-test/**'
      - '.github/workflows/lang-tests.yml'
      - 'src/Dockerfile'
      - 'docker-compose.yml'
      - 'scripts/audit_llp64_prototypes.sh'
      - 'scripts/run_fuzz.sh'
      - 'scripts/build_fuzzer.sh'
      - 'scripts/run_asan_tests.sh'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/lang/**'
      - 'tests/api/**'
      - 'tests/fuzz/**'
      - 'typeeasycode/endpoint.te'
      - 'tools/te-test/**'
      - '.github/workflows/lang-tests.yml'
      - 'src/Dockerfile'
      - 'docker-compose.yml'
      - 'scripts/run_fuzz.sh'
      - 'scripts/build_fuzzer.sh'
      - 'scripts/run_asan_tests.sh'
      - 'scripts/audit_llp64_prototypes.sh'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  llp64-prototype-audit:
    # Guard estático (Nivel 1.2): detecta constructores del parser/lexer sin
    # prototipo en src/*.h, que en Windows (LLP64) truncan punteros a 32 bits y
    # provocan SIGSEGV invisibles en Linux. Corre en segundos, sin compilar.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Audit constructor prototypes (LLP64 guard)
        run: bash scripts/audit_llp64_prototypes.sh

  lang-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build TypeEasy interpreter image
        run: |
          docker compose build typeeasy
          docker images typeeasy-typeeasy:latest --format '{{.Repository}}:{{.Tag}}  {{.Size}}'

      - name: Run language test suite
        run: |
          python tools/te-test/run_tests.py tests/lang \
            --docker \
            --docker-image typeeasy-typeeasy:latest \
            --junit tests/.report/junit-lang.xml \
            --verbose

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-lang
          path: tests/.report/junit-lang.xml
          if-no-files-found: warn

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TypeEasy lang tests
          path: tests/.report/junit-lang.xml
          reporter: java-junit
          fail-on-error: false

  api-smoke:
    # End-to-end smoke (Nivel 2.x): levanta el server `typeeasy --api` real y
    # pega HTTP contra typeeasycode/endpoint.te (rutas, model binding, JWT/@auth).
    # Es independiente de la suite de lenguaje: cubre el modo API, no el AST.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build TypeEasy interpreter image
        run: docker compose build typeeasy

      - name: Run API smoke suite
        env:
          JWT_SECRET: ci-api-smoke-secret
        run: |
          python tests/api/run_api_tests.py \
            --mode docker \
            --image typeeasy-typeeasy:latest

  asan-memcheck:
    # Memory safety (Nivel 1.3, production-ready bloqueante #3): compila el
    # interprete nativo con AddressSanitizer y corre la suite de lenguaje bajo
    # el sanitizer. Convierte los "segfaults intermitentes (exit 139)" por
    # use-after-free / heap-overflow en fallos deterministas con stack trace.
    # Corre dentro de gcc:13.2.0 (misma toolchain que el Dockerfile).
    runs-on: ubuntu-latest
    container: gcc:13.2.0
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build + test deps
        run: |
          apt-get update -qq
          apt-get install -y -qq flex bison libssl-dev default-libmysqlclient-dev \
            libcurl4-openssl-dev libpq-dev freetds-dev libsqlite3-dev zlib1g-dev python3

      - name: Build with ASan and run lang suite
        run: bash scripts/run_asan_tests.sh

      - name: Upload ASan JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-asan
          path: tests/.report/junit-asan.xml
          if-no-files-found: warn

  fuzz-smoke:
    # Fuzzing del front-end (production-ready bloqueante #8): construye el harness
    # libFuzzer del parser (lexer + Bison + AST + free_ast) con clang+ASan y corre
    # una sesión corta y acotada sobre el corpus semilla. Convierte los "segfaults
    # intermitentes en paths no cubiertos por los tests" en crashes deterministas
    # con stack trace. No persigue cobertura exhaustiva (eso es un fuzz largo
    # offline); es un guard de regresión que falla el build si una entrada
    # adversaria rompe el parser. Corre dentro de gcc:13.2.0 + clang (libFuzzer).
    #
    # seccomp=unconfined: el runtime de ASan colisiona con la ASLR de alta
    # entropía del kernel host y crashea en su PROPIA init (AsanInitInternal ->
    # internal_mmap) antes de tocar el target. run_fuzz.sh lo evita con
    # `setarch -R` (personality(ADDR_NO_RANDOMIZE)), syscall vetada por el perfil
    # seccomp por defecto; por eso se desactiva aquí.
    runs-on: ubuntu-latest
    container:
      image: gcc:13.2.0
      options: --security-opt seccomp=unconfined
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build + fuzz deps
        run: |
          apt-get update -qq
          apt-get install -y -qq clang flex bison libomp-dev libssl-dev \
            default-libmysqlclient-dev libcurl4-openssl-dev libpq-dev freetds-dev \
            libsqlite3-dev zlib1g-dev util-linux

      - name: Build fuzzer and run bounded smoke
        run: bash scripts/run_fuzz.sh 60

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: tests/fuzz/artifacts/
          if-no-files-found: ignore

  load-test:
    # Concurrency survival (Nivel 2.y, production-ready bloqueante #4): levanta
    # el server real y le pega N requests concurrentes sobre un mix de rutas.
    # No mide throughput; verifica correctitud y supervivencia bajo concurrencia
    # (cero 5xx, cuerpos correctos, server vivo al final). Cubre el modelo de
    # interprete serializado + el reset de estado por request.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build TypeEasy interpreter image
        run: docker compose build typeeasy

      - name: Run concurrency/load test
        env:
          JWT_SECRET: ci-load-secret
        run: |
          python tests/api/run_load_test.py \
            --mode docker \
            --image typeeasy-typeeasy:latest \
            --requests 600 --workers 24

  async-overlap:
    # Async endpoint semantics (C#/.NET-style `async`): levanta el server real
    # sirviendo fixtures/async_overlap_app.te y prueba que un handler `async`
    # solapa requests concurrentes (libera el invoke lock en `await`) mientras
    # que el handler PLANO equivalente los serializa (mantiene el lock). Cubre
    # la diferencia OBSERVABLE entre las dos formas de declarar un endpoint.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build TypeEasy interpreter image
        run: docker compose build typeeasy

      - name: Run async overlap test
        env:
          JWT_SECRET: ci-async-overlap-secret
        run: |
          python tests/api/run_async_overlap_test.py \
            --mode docker \
            --image typeeasy-typeeasy:latest \
            -k 4
