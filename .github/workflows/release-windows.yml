name: Release - Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version a publicar (sin prefijo v)"
        required: false
        default: "0.0.1"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $refName = "${{ github.ref_name }}"
          $inputVersion = "${{ github.event.inputs.version }}"

          if ($eventName -eq "push" -and $refName.StartsWith("v")) {
            $version = $refName.Substring(1)
          } elseif (-not [string]::IsNullOrWhiteSpace($inputVersion)) {
            $version = $inputVersion
          } else {
            $version = "0.0.1"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version objetivo: $version"

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libmariadbclient
            mingw-w64-x86_64-freetds
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            flex
            bison
            make

      - name: Build OpenSSL-based libmariadb.dll
        shell: msys2 {0}
        id: openssl_libmariadb
        env:
          MARIADB_CC_VERSION: "3.4.8"
        run: |
          set -euo pipefail
          # MSYS2 ships libmariadbclient compiled with Schannel; AWS NLB-fronted
          # MySQL services (TiDB Cloud, etc.) reject Schannel handshakes with
          # SEC_E_DECRYPT_FAILURE. Rebuild against OpenSSL and surface path.
          DLL=$(bash scripts/build_mariadb_openssl_dll.sh | tail -n1)
          echo "Built: $DLL"
          test -f "$DLL"
          # Use stable workspace-relative path so the next step (fresh shell)
          # finds the DLL without depending on $RUNNER_TEMP/cygpath.
          echo "LIBMARIADB_OPENSSL_DLL=dist/external/libmariadb.dll" >> "$GITHUB_ENV"

      - name: Setup Node.js (for VS Code extension)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build VS Code extension (.vsix with bundled LSP)
        shell: bash
        run: |
          set -euo pipefail
          # Built here with Git-bash + setup-node (the MSYS2 shell used for the
          # native build has no Node). package_windows_release.sh picks this up
          # via TYPEEASY_VSIX instead of trying to build it without Node.
          bash scripts/build_vscode_vsix.sh dist/typeeasy-debug.vsix
          test -f dist/typeeasy-debug.vsix
          echo "TYPEEASY_VSIX=dist/typeeasy-debug.vsix" >> "$GITHUB_ENV"

      - name: Build native TypeEasy and package folder
        shell: msys2 {0}
        env:
          TYPEEASY_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          bash scripts/build_native_windows.sh
          bash scripts/package_windows_release.sh "${{ steps.meta.outputs.version }}"
      - name: Smoke test (let / var / const must not segfault)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          # Regression guard: en v0.0.1 el .exe Win64 crasheaba al parsear
          # cualquier `let`/`var`/`const` por falta de prototipos en ast.h
          # (truncacion de puntero retornado a 32 bits en LLP64). Si esto
          # vuelve a pasar, el build debe fallar antes de publicar.
          BIN="dist/windows/TypeEasy-${TYPEEASY_VERSION}-win64/bin/typeeasy-bin.exe"
          if [ ! -x "$BIN" ]; then
            echo "ERROR: no encuentro $BIN" >&2
            ls -la dist/windows/ || true
            exit 1
          fi
          mkdir -p .smoke
          # 1) let / var / const  (regresion v0.0.1)
          printf 'let n = 1;\nvar s = "hi";\nconst k = 7;\nprintln(n);\nprintln(s);\nprintln(k);\n' > .smoke/_smoke.te
          out="$("$BIN" .smoke/_smoke.te 2>&1)"; rc=$?
          echo "----- smoke#1 output (rc=$rc) -----"; echo "$out"; echo "-----------------------------------"
          [ $rc -eq 0 ] || { echo "FAIL: smoke#1 exit=$rc"; exit 1; }
          echo "$out" | grep -q "^1$"  || { echo "FAIL: smoke#1 (let)";   exit 1; }
          echo "$out" | grep -q "^hi$" || { echo "FAIL: smoke#1 (var)";   exit 1; }
          echo "$out" | grep -q "^7$"  || { echo "FAIL: smoke#1 (const)"; exit 1; }

          # 2) OBJECT_LITERAL multi-key  (regresion: bug shutdown segfault)
          printf 'let m = { "a": "x", "b": "y" };\nprintln("ok-map");\n' > .smoke/_smoke_map.te
          out2="$("$BIN" .smoke/_smoke_map.te 2>&1)"; rc2=$?
          echo "----- smoke#2 output (rc=$rc2) -----"; echo "$out2"; echo "-----------------------------------"
          [ $rc2 -eq 0 ] || { echo "FAIL: smoke#2 exit=$rc2 (OBJECT_LITERAL multi-key segfault)"; exit 1; }
          echo "$out2" | grep -q "^ok-map$" || { echo "FAIL: smoke#2 sin 'ok-map'"; exit 1; }

          # 3) Funcion con multiples argumentos  (proteccion append_argument_raw)
          printf 'class P { a: int; b: int; __constructor(_a:int,_b:int){this.a=_a;this.b=_b;} }\nlet p = new P(1, 2);\nprintln("ok-args");\n' > .smoke/_smoke_args.te
          out3="$("$BIN" .smoke/_smoke_args.te 2>&1)"; rc3=$?
          echo "----- smoke#3 output (rc=$rc3) -----"; echo "$out3"; echo "-----------------------------------"
          [ $rc3 -eq 0 ] || { echo "FAIL: smoke#3 exit=$rc3 (multi-arg call segfault)"; exit 1; }
          echo "$out3" | grep -q "^ok-args$" || { echo "FAIL: smoke#3 sin 'ok-args'"; exit 1; }

          # 4) SQL Server connector debe estar COMPILADO (FreeTDS enlazado), no el
          #    stub "no esta disponible en esta build de Windows". No conectamos a
          #    un server real: basta con que NO aparezca el mensaje del stub.
          #    sqlserver_connect a un host inexistente devuelve -1 y deja la causa
          #    en __sqlserver_error__ (bridge real) en vez del warning del stub.
          printf 'let c = sqlserver_connect("127.0.0.1", "sa", "x", "db", 14333, { "encrypt": 0 });\nif (c < 0) { println("sqlserver-ok-real: " + __sqlserver_error__); } else { println("connected?!"); sqlserver_close(c); }\n' > .smoke/_smoke_mssql.te
          out4="$("$BIN" .smoke/_smoke_mssql.te 2>&1)"; rc4=$?
          echo "----- smoke#4 output (rc=$rc4) -----"; echo "$out4"; echo "-----------------------------------"
          if echo "$out4" | grep -q "no esta disponible en esta build de Windows"; then
            echo "FAIL: smoke#4 — sqlserver_* sigue en STUB (FreeTDS no se enlazo en el build)"; exit 1;
          fi
          echo "$out4" | grep -q "sqlserver-ok-real" || { echo "FAIL: smoke#4 sin 'sqlserver-ok-real' (bridge real no respondio)"; exit 1; }

          echo "Smoke tests OK"
        env:
          TYPEEASY_VERSION: ${{ steps.meta.outputs.version }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Build installer and hashes
        shell: pwsh
        run: |
          .\scripts\build_windows_installer.ps1 -Version "${{ steps.meta.outputs.version }}"
          .\scripts\write_release_hashes.ps1 -Version "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typeeasy-windows-v${{ steps.meta.outputs.version }}
          path: |
            dist/windows/TypeEasy-${{ steps.meta.outputs.version }}-win64.zip
            dist/windows/TypeEasy-Setup-v${{ steps.meta.outputs.version }}.exe
            dist/windows/SHA256SUMS-${{ steps.meta.outputs.version }}.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/TypeEasy-${{ steps.meta.outputs.version }}-win64.zip
            dist/windows/TypeEasy-Setup-v${{ steps.meta.outputs.version }}.exe
            dist/windows/SHA256SUMS-${{ steps.meta.outputs.version }}.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
