name: Release - Linux Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version a publicar (sin prefijo v)"
        required: false
        default: "0.0.1"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.1"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version objetivo: ${VERSION}"

      - name: Build TypeEasy binary inside reproducible Docker image
        # Compilamos dentro de gcc:13.2.0 (la misma imagen que usa src/Dockerfile)
        # para evitar los breaking changes de gcc 14 en ubuntu-latest.
        # El binario resultante es nativo Linux x86_64 y no requiere Docker en runtime.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/app \
            -w /app \
            -e TYPEEASY_VERSION="${{ steps.meta.outputs.version }}" \
            gcc:13.2.0 \
            bash -c '
              apt-get update &&
              apt-get install -y --no-install-recommends \
                flex bison libfl-dev libssl-dev default-libmysqlclient-dev \
                libcurl4-openssl-dev libpq-dev freetds-dev zlib1g-dev &&
              make -C /app/src clean &&
              make -C /app/src typeeasy CFLAGS_EXTRA=-DTYPEEASY_VERSION=${TYPEEASY_VERSION}
            '
          ls -lh src/typeeasy

      - name: Install packaging tools (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Package tar.gz and .deb
        run: bash scripts/package_linux_release.sh "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typeeasy-linux-v${{ steps.meta.outputs.version }}
          path: |
            dist/linux/TypeEasy-${{ steps.meta.outputs.version }}-linux-amd64.tar.gz
            dist/linux/typeeasy_${{ steps.meta.outputs.version }}_amd64.deb
            dist/linux/SHA256SUMS-${{ steps.meta.outputs.version }}.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/TypeEasy-${{ steps.meta.outputs.version }}-linux-amd64.tar.gz
            dist/linux/typeeasy_${{ steps.meta.outputs.version }}_amd64.deb
            dist/linux/SHA256SUMS-${{ steps.meta.outputs.version }}.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
